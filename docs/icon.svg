<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A1A2E"/>
      <stop offset="100%" stop-color="#16162A"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="180" fill="url(#bg)"/>
  <!-- Subtle border -->
  <rect x="4" y="4" width="1016" height="1016" rx="176" fill="none" stroke="#2A2A4E" stroke-width="4"/>
  <!-- Red "N" letter -->
  <text x="512" y="580" text-anchor="middle" dominant-baseline="central"
        font-family="'Helvetica Neue', Arial, sans-serif" font-size="620" font-weight="900"
        fill="#E60012" letter-spacing="-20">N</text>
  <!-- Subtle glow behind N -->
  <text x="512" y="580" text-anchor="middle" dominant-baseline="central"
        font-family="'Helvetica Neue', Arial, sans-serif" font-size="620" font-weight="900"
        fill="#E60012" opacity="0.15" filter="url(#blur)">N</text>
</svg>
